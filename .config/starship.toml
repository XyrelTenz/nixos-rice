# ============================================================
#  starship.toml — cyberdream · Windows PowerShell · MAXED
# ============================================================

format = """
[╭─────⭕ ](fg:#ffffff)\
$username\
[   📁 ](fg:#ffffff)\
$directory\
\n[│](fg:#ffffff)  \
[Branch:](dimmed) \
$git_branch\
[  ](fg:#ffffff)\
[Status:](dimmed) \
$git_status\
[  ](fg:#ffffff)\
[Commit:](dimmed) \
$git_commit\
[  ](fg:#ffffff)\
[State:](dimmed) \
$git_state\
[  ](fg:#ffffff)\
[Metrics:](dimmed) \
$git_metrics\
\n[│](fg:#ffffff)  \
[MEM: ](dimmed)\
$memory_usage\
[   BAT: ](dimmed)\
$battery\
[   ](dimmed)\
$time\
\n[│](fg:#ffffff)  \
[ENV: ](dimmed)\
$env_var\
[   PKG: ](dimmed)\
$package\
[   CC: ](dimmed)\
$c\
[   CMAKE: ](dimmed)\
$cmake\
\n[│](fg:#ffffff)  \
[TOOLS: ](dimmed)\
$nodejs\
$python\
$conda\
$rust\
$golang\
$java\
$kotlin\
$lua\
$ruby\
$php\
$docker_context\
$terraform\
$helm\
$kubernetes\
\n[│](fg:#ffffff)  \
$cmd_duration\
[   ](fg:#ffffff)\
$jobs\
[   ](fg:#ffffff)\
$shlvl\
[   ](fg:#ffffff)\
$shell\
[\n╰─](fg:#ffffff)\
$character\
"""

right_format = ""
palette      = 'cyberdream'

[palettes.cyberdream]
text         = '#ff9318'
overlay1     = '#2a3555'
color_blue   = '#4d9fff'
color_aqua   = '#00eaff'
color_green  = '#00ff15'
color_orange = '#ff8c00'
color_red    = '#ff3b25'
color_yellow = '#eaff00'
color_pink   = '#ff2c84'
color_purple = '#b040ff'
color_violet = '#a78bfa'
red          = '#ff3b25'

# ============================================================
#  Row 1 — Identity
# ============================================================

[username]
show_always = true
style_user  = "fg:#ff9318 bold underline"
style_root  = "fg:#ff3b25 bold underline"
format      = "[$user]($style)"


[directory]
style             = "fg:#ffffff bold"
format            = "[$path ]($style)"
truncation_length = 100
truncation_symbol = ""
use_os_path_sep   = false
truncate_to_repo  = false
use_logical_path  = true

[directory.substitutions]
"Documents" = "Docs"
"Downloads" = "DL"
"Desktop"   = "Desk"
"Projects"  = "Proj"

# ============================================================
#  Row 2 — Git full details
# ============================================================

[git_branch]
symbol   = "⎇"
style    = "fg:#eaff00 bold"
format   = "[$symbol $branch(:$remote_branch) ]($style)"

[git_status]
style      = "fg:#ff8c00"
format     = "[$all_status$ahead_behind ]($style)"
ahead      = "^$count"
behind     = "v$count"
diverged   = "^${ahead_count}v${behind_count}"
untracked  = "?$count"
stashed    = "S$count"
modified   = "!$count"
staged     = "+$count"
deleted    = "x$count"
conflicted = "=$count"
renamed    = "r$count"

[git_commit]
only_detached      = false
format             = "[@$hash$tag ](fg:#ff2c84)"
commit_hash_length = 6
tag_symbol         = " #"
tag_disabled       = false

[git_state]
style           = "fg:#ff3b25 bold"
format          = "[$state($progress_current/$progress_total) ]($style)"
rebase          = "REBASE"
merge           = "MERGE"
revert          = "REVERT"
cherry_pick     = "CHERRY"
bisect          = "BISECT"
am              = "AM"
am_or_rebase    = "AM/REBASE"

[git_metrics]
disabled              = false
added_style           = "fg:#00ff15 bold"
deleted_style         = "fg:#ff3b25 bold"
format                = "[+$added ]($added_style)[-$deleted ]($deleted_style)"
only_nonzero_diffs    = true

# ============================================================
#  Row 3 — Shell info
# ============================================================

[cmd_duration]
min_time          = 500
style             = "fg:#c084fc bold"
format            = "[took $duration ]($style)"
show_milliseconds = true
min_time_to_notify = 10000

[jobs]
symbol    = "~"
style     = "fg:#00eaff bold"
format    = "[$symbol$number jobs ]($style)"
threshold = 1

[shlvl]
disabled  = false
style     = "fg:#ff8c00 bold"
format    = "[SHLVL:$shlvl ]($style)"
threshold = 2
repeat    = false


# ============================================================
#  Row 4 — System stats
# ============================================================

[memory_usage]
disabled  = false
threshold = 0
style     = "fg:#a78bfa bold"
format    = "[$ram_pct ($ram/$swap_pct swap) ]($style)"

[battery]
full_symbol        = "FULL"
charging_symbol    = "CHG"
discharging_symbol = "BAT"
unknown_symbol     = "BAT?"
empty_symbol       = "LOW!"
format             = "[$symbol $percentage ]($style)"

[[battery.display]]
threshold = 15
style     = "fg:#ff3b25 bold"

[[battery.display]]
threshold = 50
style     = "fg:#ff8c00 bold"

[[battery.display]]
threshold = 100
style     = "fg:#00ff15 bold"

[time]
disabled    = false
time_format = "%d %b %Y  %H:%M:%S"
style       = "fg:#00eaff bold"
format      = "[$time ]($style)"


# ============================================================
#  Row 5 — Env vars + package + build tools
# ============================================================

[env_var.VIRTUAL_ENV]
variable = "VIRTUAL_ENV"
style    = "fg:#ff2c84"
format   = "[$env_value ]($style)"
default  = ""

[package]
disabled      = false
style         = "fg:#ff8c00 bold"
format        = "[$symbol$version ]($style)"
symbol        = "pkg:"
version_format = "v${raw}"

[c]
disabled = false
style    = "fg:#4d9fff bold"
format   = "[$symbol$version ]($style)"
symbol   = "C:"

[cmake]
disabled = false
style    = "fg:#4d9fff"
format   = "[$symbol$version ]($style)"
symbol   = "cmake:"

# ============================================================
#  Row 6 — Toolchain (auto-hides per directory)
# ============================================================

[nodejs]
symbol = "Node"
format = "[$symbol:$version ](fg:#00ff15)"

[python]
symbol        = "Py"
format        = "[$symbol:$version( ($virtualenv)) ](fg:#eaff00)"
python_binary = ["python3", "python"]

[conda]
symbol      = "conda"
format      = "[$symbol:$environment ](fg:#00e010)"
ignore_base = true

[rust]
symbol = "Rs"
format = "[$symbol:$version ](fg:#ff8c00)"

[golang]
symbol = "Go"
format = "[$symbol:$version ](fg:#00eaff)"

[java]
symbol = "Java"
format = "[$symbol:$version ](fg:#ff2c84)"

[kotlin]
disabled = false
symbol   = "Kt"
format   = "[$symbol:$version ](fg:#b040ff)"

[lua]
disabled = false
symbol   = "Lua"
format   = "[$symbol:$version ](fg:#4d9fff)"

[ruby]
disabled = false
symbol   = "Rb"
format   = "[$symbol:$version ](fg:#ff3b25)"

[php]
disabled = false
symbol   = "PHP"
format   = "[$symbol:$version ](fg:#b040ff)"

[docker_context]
symbol          = "Docker"
format          = "[$symbol:$context ](fg:#3a8fff)"
only_with_files = false

[terraform]
disabled = false
symbol   = "TF"
format   = "[$symbol:$workspace ](fg:#b040ff)"

[helm]
disabled = false
symbol   = "Helm"
format   = "[$symbol:$version ](fg:#4d9fff)"

[kubernetes]
disabled = false
style    = "fg:#4d9fff bold"
format   = "[$symbol$context(::$namespace) ]($style)"
symbol   = "K8s:"


# ============================================================
#  Prompt character
# ============================================================

[character]
format         = "$symbol "
success_symbol = "[➤ ](bold fg:#ffffff)"
error_symbol   = "[➤ ](bold fg:#ff3b25)"
vimcmd_symbol  = "[N ](bold fg:#00ff15)"