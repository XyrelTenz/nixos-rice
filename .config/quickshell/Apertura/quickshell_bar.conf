[general]
# Match this to your visualizer bar count (e.g., 5 bars)
bars = 10
framerate = 60

[input]
# Explicitly leverage PipeWire loopback for perfect audio capture
method = pipewire
source = auto

[output]
# Output raw data format: ascii values separated by semicolons
method = raw
data_format = ascii
ascii_max_range = 100